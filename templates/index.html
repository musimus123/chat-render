<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UDABOL CHAT</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0f172a;
color:white;
}

.chat-container{
width:400px;
height:600px;
background:#111827;
border-radius:20px;
overflow:hidden;
display:flex;
flex-direction:column;
}

.chat-header{
padding:15px;
text-align:center;
background:#1f2937;
font-size:20px;
font-weight:bold;
}

.login{
padding:10px;
display:flex;
gap:10px;
background:#1f2937;
}

.chat{
flex:1;
padding:10px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
padding:10px;
border-radius:10px;
max-width:80%;
word-wrap:break-word;
}

.own{
background:#3b82f6;
align-self:flex-end;
}

.other{
background:#374151;
align-self:flex-start;
}

.input-area{
display:flex;
padding:10px;
gap:10px;
background:#1f2937;
}

input{
flex:1;
padding:10px;
border:none;
outline:none;
border-radius:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
background:#22c55e;
color:white;
}

.hidden{
display:none;
}

</style>
</head>
<body>

<div class="chat-container">

<div class="chat-header">
💬 CHAT UDABOL
</div>

<div class="login" id="loginBox">

<input
type="text"
id="nombre"
placeholder="Tu nombre">

<button id="btnIngresar">
Entrar
</button>

</div>

<div class="chat" id="chat"></div>

<div class="input-area">

<input
type="text"
id="mensaje"
placeholder="Escribe un mensaje">

<button id="btnEnviar">
Enviar
</button>

</div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const socket = io();

let nombreUsuario = "";

const chat =
document.getElementById("chat");

const loginBox =
document.getElementById("loginBox");

document
.getElementById("btnIngresar")
.addEventListener("click",()=>{

const nombre =
document.getElementById("nombre");

if(nombre.value.trim()===""){
alert("Ingresa tu nombre");
return;
}

nombreUsuario =
nombre.value
.trim()
.substring(0,20);

loginBox.classList.add("hidden");

});

document
.getElementById("btnEnviar")
.addEventListener("click",enviarMensaje);

function enviarMensaje(){

const input =
document.getElementById("mensaje");

const text =
input.value
.trim()
.substring(0,200);

if(text==="") return;

const mensaje =
`${nombreUsuario}: ${text}`;

socket.emit(
"message",
mensaje
);

input.value = "";

}

socket.on(
"message",
(mensaje)=>{

const div =
document.createElement("div");

div.classList.add("message");

if(
mensaje.startsWith(
nombreUsuario + ":"
)
){
div.classList.add("own");
}else{
div.classList.add("other");
}

div.innerText = mensaje;

chat.appendChild(div);

chat.scrollTop =
chat.scrollHeight;

});

</script>

</body>
</html>
